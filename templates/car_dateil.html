{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>next_page</title>
    <link rel="stylesheet" href="{% static 'dateil.css' %}">
</head>
<body>


<div class="card-wrapper">

<div class="card-container">
  <div class="card">

    {% if car.image %}
      <img src="{{ car.image.url }}" alt="{{ car.name }}" class="card-img">
    {% endif %}

   <div class="card-info">
    <div class="card-about">
      <div class="card-time">{{ car.year }}</div>
    </div>
    <h1 class="card-title">{{ car.name }}</h1>
    <div class="card-creator">{{ car.discriptions }}</div>

    <div class="creator"><b>Цена:</b> {{ car.price }} $</div>

    <div class="creator">
        <span style="color: #888;">👁 Просмотров: {{ car.views }}</span>
    </div>
</div>

  </div>
</div>

</div>
</body>
</html>


<a href="{% url 'next_to_page' %}">
    <button class="button type1">
        <span class="btn-txt">НАЗАД</span>
    </button>
</a>
